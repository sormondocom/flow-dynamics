<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <title>Flow Dynamics — Pipe Network Simulator</title>
  <defs>

    <!-- Glow filter (strong, for source/sink nodes) -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter (soft, for water lines) -->
    <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background radial gradient -->
    <radialGradient id="bg" cx="50%" cy="48%" r="52%">
      <stop offset="0%"   stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#040612"/>
    </radialGradient>

    <!-- Water animation -->
    <style>
      /* Outer pipe shell */
      .pipe {
        stroke: #1f3347;
        stroke-width: 8;
        stroke-linecap: round;
        fill: none;
      }
      /* Inner water channel — animated flowing dashes */
      .water {
        stroke-width: 4;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 8 5;
        filter: url(#glow-sm);
        animation: flow 0.9s linear infinite;
      }
      /* Pipe fitting / junction dot */
      .jt { fill: #1e3347; }

      @keyframes flow {
        from { stroke-dashoffset: 26; }
        to   { stroke-dashoffset: 0;  }
      }

      /* Staggered color cascade across letters */
      .g-f    .water { stroke: #2255dd; animation-delay:  0.00s; }
      .g-l    .water { stroke: #2d66ee; animation-delay: -0.11s; }
      .g-o    .water { stroke: #3a7fff; animation-delay: -0.22s; }
      .g-w    .water { stroke: #2d66ee; animation-delay: -0.33s; }
      .g-d    .water { stroke: #1144cc; animation-delay: -0.49s; }
      .g-y    .water { stroke: #1a55dd; animation-delay: -0.60s; }
      .g-n    .water { stroke: #2266ee; animation-delay: -0.71s; }
      .g-a    .water { stroke: #2d77ff; animation-delay: -0.82s; }
      .g-m    .water { stroke: #2266ee; animation-delay: -0.93s; }
      .g-i    .water { stroke: #1a55dd; animation-delay: -1.04s; }
      .g-c    .water { stroke: #1144cc; animation-delay: -1.15s; }
      .g-s    .water { stroke: #1a55dd; animation-delay: -1.26s; }
    </style>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle dot grid overlay -->
  <g opacity="0.18">
    <!-- horizontal lines every 20px -->
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="20"  x2="900" y2="20"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="40"  x2="900" y2="40"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="60"  x2="900" y2="60"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="80"  x2="900" y2="80"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="100" x2="900" y2="100"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="120" x2="900" y2="120"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="140" x2="900" y2="140"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="160" x2="900" y2="160"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="180" x2="900" y2="180"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="200" x2="900" y2="200"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="220" x2="900" y2="220"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="240" x2="900" y2="240"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="260" x2="900" y2="260"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="280" x2="900" y2="280"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="0" y1="300" x2="900" y2="300"/>
    <!-- vertical lines every 24px -->
    <line stroke="#1a3050" stroke-width="0.4" x1="24"  y1="0" x2="24"  y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="48"  y1="0" x2="48"  y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="72"  y1="0" x2="72"  y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="96"  y1="0" x2="96"  y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="120" y1="0" x2="120" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="144" y1="0" x2="144" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="168" y1="0" x2="168" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="192" y1="0" x2="192" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="216" y1="0" x2="216" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="240" y1="0" x2="240" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="264" y1="0" x2="264" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="288" y1="0" x2="288" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="312" y1="0" x2="312" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="336" y1="0" x2="336" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="360" y1="0" x2="360" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="384" y1="0" x2="384" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="408" y1="0" x2="408" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="432" y1="0" x2="432" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="456" y1="0" x2="456" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="480" y1="0" x2="480" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="504" y1="0" x2="504" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="528" y1="0" x2="528" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="552" y1="0" x2="552" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="576" y1="0" x2="576" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="600" y1="0" x2="600" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="624" y1="0" x2="624" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="648" y1="0" x2="648" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="672" y1="0" x2="672" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="696" y1="0" x2="696" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="720" y1="0" x2="720" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="744" y1="0" x2="744" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="768" y1="0" x2="768" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="792" y1="0" x2="792" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="816" y1="0" x2="816" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="840" y1="0" x2="840" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="864" y1="0" x2="864" y2="320"/>
    <line stroke="#1a3050" stroke-width="0.4" x1="888" y1="0" x2="888" y2="320"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════════
       ROW 1 — F L O W
       Unit = 12px.  y_top = 50,  y_bot = 134  (7 units tall)
       Letters: F(x=288) L(x=372) O(x=456) W(x=540, 6u wide)
       ══════════════════════════════════════════════════════════════════ -->

  <!-- ── F (x=288) ── -->
  <g class="g-f">
    <!-- outer pipes -->
    <line class="pipe" x1="288" y1="50"  x2="348" y2="50"/>   <!-- top H: x → x+5u -->
    <line class="pipe" x1="288" y1="50"  x2="288" y2="134"/>  <!-- left V: full height -->
    <line class="pipe" x1="288" y1="86"  x2="324" y2="86"/>   <!-- mid H: y+3u, x → x+3u -->
    <!-- water -->
    <line class="water" x1="288" y1="50"  x2="348" y2="50"/>
    <line class="water" x1="288" y1="50"  x2="288" y2="134"/>
    <line class="water" x1="288" y1="86"  x2="324" y2="86"/>
    <!-- joints -->
    <circle class="jt" cx="288" cy="50"  r="5.5"/>
    <circle class="jt" cx="348" cy="50"  r="5.5"/>
    <circle class="jt" cx="288" cy="86"  r="5.5"/>
    <circle class="jt" cx="324" cy="86"  r="5.5"/>
    <circle class="jt" cx="288" cy="134" r="5.5"/>
  </g>

  <!-- ── L (x=372) ── -->
  <g class="g-l">
    <line class="pipe"  x1="372" y1="50"  x2="372" y2="134"/>
    <line class="pipe"  x1="372" y1="134" x2="432" y2="134"/>  <!-- bottom H: x → x+5u -->
    <line class="water" x1="372" y1="50"  x2="372" y2="134"/>
    <line class="water" x1="372" y1="134" x2="432" y2="134"/>
    <circle class="jt" cx="372" cy="50"  r="5.5"/>
    <circle class="jt" cx="372" cy="134" r="5.5"/>
    <circle class="jt" cx="432" cy="134" r="5.5"/>
  </g>

  <!-- ── O (x=456) ── -->
  <g class="g-o">
    <line class="pipe"  x1="456" y1="50"  x2="516" y2="50"/>   <!-- top H -->
    <line class="pipe"  x1="516" y1="50"  x2="516" y2="134"/>  <!-- right V -->
    <line class="pipe"  x1="456" y1="134" x2="516" y2="134"/>  <!-- bottom H -->
    <line class="pipe"  x1="456" y1="50"  x2="456" y2="134"/>  <!-- left V -->
    <line class="water" x1="456" y1="50"  x2="516" y2="50"/>
    <line class="water" x1="516" y1="50"  x2="516" y2="134"/>
    <line class="water" x1="456" y1="134" x2="516" y2="134"/>
    <line class="water" x1="456" y1="50"  x2="456" y2="134"/>
    <circle class="jt" cx="456" cy="50"  r="5.5"/>
    <circle class="jt" cx="516" cy="50"  r="5.5"/>
    <circle class="jt" cx="516" cy="134" r="5.5"/>
    <circle class="jt" cx="456" cy="134" r="5.5"/>
  </g>

  <!-- ── W (x=540, 6u=72px wide) ── -->
  <!-- Shape: three prongs (left, center-short, right) joined at bottom bar -->
  <g class="g-w">
    <line class="pipe"  x1="540" y1="50"  x2="540" y2="134"/>  <!-- left V -->
    <line class="pipe"  x1="612" y1="50"  x2="612" y2="134"/>  <!-- right V (x+6u) -->
    <line class="pipe"  x1="540" y1="134" x2="612" y2="134"/>  <!-- bottom H -->
    <line class="pipe"  x1="576" y1="86"  x2="576" y2="134"/>  <!-- center V (x+3u, starts at y+3u) -->
    <line class="water" x1="540" y1="50"  x2="540" y2="134"/>
    <line class="water" x1="612" y1="50"  x2="612" y2="134"/>
    <line class="water" x1="540" y1="134" x2="612" y2="134"/>
    <line class="water" x1="576" y1="86"  x2="576" y2="134"/>
    <circle class="jt" cx="540" cy="50"  r="5.5"/>
    <circle class="jt" cx="612" cy="50"  r="5.5"/>
    <circle class="jt" cx="540" cy="134" r="5.5"/>
    <circle class="jt" cx="612" cy="134" r="5.5"/>
    <circle class="jt" cx="576" cy="86"  r="5.5"/>
    <circle class="jt" cx="576" cy="134" r="5.5"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════════
       ROW 2 — D Y N A M I C S
       y_top = 169,  y_bot = 253
       D(132) Y(216) N(300) A(384) M(468,6u) I(564,2u) C(624) S(708)
       ══════════════════════════════════════════════════════════════════ -->

  <!-- ── D (x=132, right side at x+4u=180) ── -->
  <g class="g-d">
    <line class="pipe"  x1="132" y1="169" x2="132" y2="253"/>  <!-- left V -->
    <line class="pipe"  x1="132" y1="169" x2="180" y2="169"/>  <!-- top H -->
    <line class="pipe"  x1="180" y1="169" x2="180" y2="253"/>  <!-- right V -->
    <line class="pipe"  x1="132" y1="253" x2="180" y2="253"/>  <!-- bottom H -->
    <line class="water" x1="132" y1="169" x2="132" y2="253"/>
    <line class="water" x1="132" y1="169" x2="180" y2="169"/>
    <line class="water" x1="180" y1="169" x2="180" y2="253"/>
    <line class="water" x1="132" y1="253" x2="180" y2="253"/>
    <circle class="jt" cx="132" cy="169" r="5.5"/>
    <circle class="jt" cx="180" cy="169" r="5.5"/>
    <circle class="jt" cx="132" cy="253" r="5.5"/>
    <circle class="jt" cx="180" cy="253" r="5.5"/>
  </g>

  <!-- ── Y (x=216, center at x+2.5u=246) ── -->
  <g class="g-y">
    <line class="pipe"  x1="216" y1="169" x2="216" y2="205"/>  <!-- left arm (0→y+3u) -->
    <line class="pipe"  x1="276" y1="169" x2="276" y2="205"/>  <!-- right arm (x+5u) -->
    <line class="pipe"  x1="216" y1="205" x2="246" y2="205"/>  <!-- left H → center -->
    <line class="pipe"  x1="276" y1="205" x2="246" y2="205"/>  <!-- right H → center -->
    <line class="pipe"  x1="246" y1="205" x2="246" y2="253"/>  <!-- center stem -->
    <line class="water" x1="216" y1="169" x2="216" y2="205"/>
    <line class="water" x1="276" y1="169" x2="276" y2="205"/>
    <line class="water" x1="216" y1="205" x2="246" y2="205"/>
    <line class="water" x1="276" y1="205" x2="246" y2="205"/>
    <line class="water" x1="246" y1="205" x2="246" y2="253"/>
    <circle class="jt" cx="216" cy="169" r="5.5"/>
    <circle class="jt" cx="276" cy="169" r="5.5"/>
    <circle class="jt" cx="216" cy="205" r="5.5"/>
    <circle class="jt" cx="276" cy="205" r="5.5"/>
    <circle class="jt" cx="246" cy="205" r="5.5"/>
    <circle class="jt" cx="246" cy="253" r="5.5"/>
  </g>

  <!-- ── N (x=300) — staircase cross-pipe for diagonal feel ── -->
  <g class="g-n">
    <line class="pipe"  x1="300" y1="169" x2="300" y2="253"/>  <!-- left V -->
    <line class="pipe"  x1="360" y1="169" x2="360" y2="253"/>  <!-- right V (x+5u) -->
    <line class="pipe"  x1="300" y1="169" x2="330" y2="169"/>  <!-- short top H (x→x+2.5u) -->
    <line class="pipe"  x1="330" y1="169" x2="330" y2="211"/>  <!-- stair V (→y+3.5u) -->
    <line class="pipe"  x1="330" y1="211" x2="360" y2="211"/>  <!-- stair H → right V -->
    <line class="water" x1="300" y1="169" x2="300" y2="253"/>
    <line class="water" x1="360" y1="169" x2="360" y2="253"/>
    <line class="water" x1="300" y1="169" x2="330" y2="169"/>
    <line class="water" x1="330" y1="169" x2="330" y2="211"/>
    <line class="water" x1="330" y1="211" x2="360" y2="211"/>
    <circle class="jt" cx="300" cy="169" r="5.5"/>
    <circle class="jt" cx="360" cy="169" r="5.5"/>
    <circle class="jt" cx="300" cy="253" r="5.5"/>
    <circle class="jt" cx="360" cy="253" r="5.5"/>
    <circle class="jt" cx="330" cy="169" r="5.5"/>
    <circle class="jt" cx="330" cy="211" r="5.5"/>
    <circle class="jt" cx="360" cy="211" r="5.5"/>
  </g>

  <!-- ── A (x=384) — frame + crossbar ── -->
  <g class="g-a">
    <line class="pipe"  x1="384" y1="169" x2="444" y2="169"/>  <!-- top H -->
    <line class="pipe"  x1="384" y1="169" x2="384" y2="253"/>  <!-- left V -->
    <line class="pipe"  x1="444" y1="169" x2="444" y2="253"/>  <!-- right V -->
    <line class="pipe"  x1="384" y1="205" x2="444" y2="205"/>  <!-- crossbar (y+3u) -->
    <line class="water" x1="384" y1="169" x2="444" y2="169"/>
    <line class="water" x1="384" y1="169" x2="384" y2="253"/>
    <line class="water" x1="444" y1="169" x2="444" y2="253"/>
    <line class="water" x1="384" y1="205" x2="444" y2="205"/>
    <circle class="jt" cx="384" cy="169" r="5.5"/>
    <circle class="jt" cx="444" cy="169" r="5.5"/>
    <circle class="jt" cx="384" cy="253" r="5.5"/>
    <circle class="jt" cx="444" cy="253" r="5.5"/>
    <circle class="jt" cx="384" cy="205" r="5.5"/>
    <circle class="jt" cx="444" cy="205" r="5.5"/>
  </g>

  <!-- ── M (x=468, 6u=72px wide) — arch with center drip ── -->
  <g class="g-m">
    <line class="pipe"  x1="468" y1="169" x2="468" y2="253"/>  <!-- left V -->
    <line class="pipe"  x1="540" y1="169" x2="540" y2="253"/>  <!-- right V (x+6u) -->
    <line class="pipe"  x1="468" y1="169" x2="540" y2="169"/>  <!-- top H -->
    <line class="pipe"  x1="504" y1="169" x2="504" y2="205"/>  <!-- center drip (x+3u → y+3u) -->
    <line class="water" x1="468" y1="169" x2="468" y2="253"/>
    <line class="water" x1="540" y1="169" x2="540" y2="253"/>
    <line class="water" x1="468" y1="169" x2="540" y2="169"/>
    <line class="water" x1="504" y1="169" x2="504" y2="205"/>
    <circle class="jt" cx="468" cy="169" r="5.5"/>
    <circle class="jt" cx="540" cy="169" r="5.5"/>
    <circle class="jt" cx="468" cy="253" r="5.5"/>
    <circle class="jt" cx="540" cy="253" r="5.5"/>
    <circle class="jt" cx="504" cy="169" r="5.5"/>
    <circle class="jt" cx="504" cy="205" r="5.5"/>
  </g>

  <!-- ── I (x=564, center at x+u=576) ── -->
  <g class="g-i">
    <line class="pipe"  x1="576" y1="169" x2="576" y2="253"/>  <!-- center V -->
    <line class="pipe"  x1="564" y1="169" x2="588" y2="169"/>  <!-- top serif (x → x+2u) -->
    <line class="pipe"  x1="564" y1="253" x2="588" y2="253"/>  <!-- bottom serif -->
    <line class="water" x1="576" y1="169" x2="576" y2="253"/>
    <line class="water" x1="564" y1="169" x2="588" y2="169"/>
    <line class="water" x1="564" y1="253" x2="588" y2="253"/>
    <circle class="jt" cx="576" cy="169" r="5.5"/>
    <circle class="jt" cx="564" cy="169" r="5.5"/>
    <circle class="jt" cx="588" cy="169" r="5.5"/>
    <circle class="jt" cx="576" cy="253" r="5.5"/>
    <circle class="jt" cx="564" cy="253" r="5.5"/>
    <circle class="jt" cx="588" cy="253" r="5.5"/>
  </g>

  <!-- ── C (x=624) — open right ── -->
  <g class="g-c">
    <line class="pipe"  x1="624" y1="169" x2="624" y2="253"/>  <!-- left V -->
    <line class="pipe"  x1="624" y1="169" x2="684" y2="169"/>  <!-- top H (x → x+5u) -->
    <line class="pipe"  x1="624" y1="253" x2="684" y2="253"/>  <!-- bottom H -->
    <line class="water" x1="624" y1="169" x2="624" y2="253"/>
    <line class="water" x1="624" y1="169" x2="684" y2="169"/>
    <line class="water" x1="624" y1="253" x2="684" y2="253"/>
    <circle class="jt" cx="624" cy="169" r="5.5"/>
    <circle class="jt" cx="684" cy="169" r="5.5"/>
    <circle class="jt" cx="624" cy="253" r="5.5"/>
    <circle class="jt" cx="684" cy="253" r="5.5"/>
  </g>

  <!-- ── S (x=708, rx=768) — two hairpin bends ── -->
  <g class="g-s">
    <line class="pipe"  x1="768" y1="169" x2="708" y2="169"/>  <!-- top H (right→left) -->
    <line class="pipe"  x1="708" y1="169" x2="708" y2="205"/>  <!-- upper-left V (y→y+3u) -->
    <line class="pipe"  x1="708" y1="205" x2="768" y2="205"/>  <!-- mid H (left→right) -->
    <line class="pipe"  x1="768" y1="205" x2="768" y2="253"/>  <!-- lower-right V -->
    <line class="pipe"  x1="768" y1="253" x2="708" y2="253"/>  <!-- bottom H (right→left) -->
    <line class="water" x1="768" y1="169" x2="708" y2="169"/>
    <line class="water" x1="708" y1="169" x2="708" y2="205"/>
    <line class="water" x1="708" y1="205" x2="768" y2="205"/>
    <line class="water" x1="768" y1="205" x2="768" y2="253"/>
    <line class="water" x1="768" y1="253" x2="708" y2="253"/>
    <circle class="jt" cx="708" cy="169" r="5.5"/>
    <circle class="jt" cx="768" cy="169" r="5.5"/>
    <circle class="jt" cx="708" cy="205" r="5.5"/>
    <circle class="jt" cx="768" cy="205" r="5.5"/>
    <circle class="jt" cx="708" cy="253" r="5.5"/>
    <circle class="jt" cx="768" cy="253" r="5.5"/>
  </g>

  <!-- ── Source node — water enters at F top-left ── -->
  <circle cx="288" cy="50" r="11" fill="#7a1a1a" filter="url(#glow)"/>
  <circle cx="288" cy="50" r="7"  fill="#cc2a2a"/>
  <circle cx="288" cy="50" r="3"  fill="#ff7070"/>

  <!-- ── Sink node — water exits at S bottom-left ── -->
  <circle cx="708" cy="253" r="11" fill="#0e2d6e" filter="url(#glow)"/>
  <circle cx="708" cy="253" r="7"  fill="#1a55cc"/>
  <circle cx="708" cy="253" r="3"  fill="#66aaff"/>

  <!-- ── Subtitle ── -->
  <text x="450" y="295"
        text-anchor="middle"
        fill="#223344"
        font-size="10.5"
